<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Own Videogame</title>
    <link rel="stylesheet" href="mOV.css" />
    <script src="mOV.js" defer></script>
</head>
<body>
    <div id="a">
        <label for="difficulty">Choose Difficulty:</label>
        <select id="difficulty" name="difficulties">
            <option value="0.7">Super Easy</option>
            <option value="0.8">Easy</option>
            <option value="1" selected>Normal</option>
            <option value="1.2">Hard</option>
            <option value="1.5">Super Hard</option>
        </select>
    </div>
    <button id="start"><strong>Press to start the Game</strong></button>
    <canvas id="collision"></canvas>
    <canvas id="canvas"></canvas>
</body>
